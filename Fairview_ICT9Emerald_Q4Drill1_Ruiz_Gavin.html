<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drill 1</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<Style>
.container {
  height: relative;
  width: 1000px;
  position: center;
  border: 5px solid gray;
  align-self: center;
  text-align: center;
}
</Style>
<body>
   <div class="container bg-info text-center">
    <label>Enter kWh</label>
    <div class="row">
        <form class="-flex">
    <div class="col-lg-8">
    <input type="text" id="KWH" class="form-control" placeholder="Enter number" required>
    </div>
    <div class="col-lg-8">
    <input type="button" name="button" id="Electricity" value="Computation 
    Classification" class="btn btn-info rounded" onclick="CheckConsump()">
    </form>
    </div>
    </div>
   </div> 


<script>
function CheckConsump(){

    var KWH = document.getElementById('KWH').value;
    if (isNaN===KWH || KWH ==='' || KWH<0){
    window.alert("Please Enter a valid number");
    }
else if (KWH <= 100) {
window.alert("Lifeline Consumer Discounted Electricity Bills");
}
else if (KWH <= 200) {
window.alert("Low Consumption Normal residential rate");
}
else if (KWH <= 300) {
window.alert("Average Consumption Typical electricity usage");
}
else if (KWH <= 500) {
window.alert("High Consumption Higher electricity usage");
}
else
window.alert("Very High Consumption Heavy electricity users");
} 

</script>
</body>

</html>
